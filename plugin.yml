main: ${project.groupId}.${project.name}
name: ${project.name}
version: ${project.version}
website: ${project.url}
description: ${project.description}
authors: [eirikh1996, Ymerejliaf]
api-version: 1.21
softdepend: [Factions, MassiveCore, DiscordSRV, Essentials, PlaceholderAPI]

permissions:
  # -------------------------------------------- #
  # THE REAL NODES
  # -------------------------------------------- #
  factions.chat.ally:
    description: Access ally chat channel
    default: op
  factions.chat.truce:
    description: Access truce chat channel
    default: op
  factions.chat.faction:
    description: Access faction chat channel
    default: op
  factions.chat.local:
    description: Access local chat channel
    default: op
  factions.chat.global:
    description: Access global chat channel
    default: op
  factions.chat.enemy:
    description: Access enemy chat channel
    default: op
  factions.chat.neutral:
    description: Access neutral chat channel
    default: op
  factions.chat.world:
    description: Access world chat channel
    default: op
  factions.chat.color:
    description: Use color codes in chat messages
    default: op
  factions.chat.format:
    description: Use formatting codes in chat messages
    default: op
  factions.chat.magic:
    description: Use magic codes in chat messages
    default: op
  factions.chat.rgb:
    description: Use RGB (hex) color codes in chat messages
    default: op
  factions.chat.url:
    description: Send clickable URLs in chat messages
    default: op
  factions.chat.hover:
    description: MiniMessage hover tags (show_text, show_item, show_entity, …) in chat
    default: op
  factions.chat.click:
    description: MiniMessage non-URL click actions (run_command, suggest_command, copy_to_clipboard, …) in chat
    default: op
  factions.chat.click.bypass:
    description: Bypass blacklisted MiniMessage commands for run/suggest click payloads in chat
    default: false
  factions.chat.insert:
    description: MiniMessage <insert> - shift-click pastes text into the chat box (message not sent until the player sends it)
    default: op
  factions.chat.keybind:
    description: MiniMessage keybind tag (e.g. key.jump) in chat
    default: op
  factions.chat.translatable:
    description: MiniMessage lang / translate / tr (and *_or fallback) tags in chat
    default: op
  factions.chat.rainbow:
    description: MiniMessage rainbow tag in chat (requires color permission in practice)
    default: op
  factions.chat.gradient:
    description: MiniMessage gradient tag in chat
    default: op
  factions.chat.transition:
    description: MiniMessage transition tag in chat
    default: op
  factions.chat.font:
    description: MiniMessage font tag in chat
    default: op
  factions.chat.selector:
    description: MiniMessage selector / sel tag in chat
    default: op
  factions.chat.score:
    description: MiniMessage score tag in chat
    default: op
  factions.chat.nbt:
    description: MiniMessage NBT / data tag in chat
    default: op
  factions.chat.pride:
    description: MiniMessage pride tag in chat
    default: op
  factions.chat.sprite:
    description: MiniMessage sprite tag in chat (MiniMessage 4.25+ when supported by the server Adventure build)
    default: op
  factions.chat.head:
    description: MiniMessage head tag in chat (MiniMessage 4.25+ when supported by the server Adventure build)
    default: op
  factions.chat.reload:
    description: Reload the plugin configuration file
    default: op
  factions.chat.staff:
    description: Access staff chat channel
    default: op
  factions.chat.ignore:
    description: Use ignore commands to manage personal ignore list
    default: op
  factions.chat.ignore.admin:
    description: Manage other players' ignore lists
    default: op
  factions.chat.ignore.bypass:
    description: Bypass being ignored by other players
    default: false
  factions.chat.toggle:
    description: Toggle (disable/enable) specific chat modes
    default: op
  factions.chat.toggle.admin:
    description: Toggle chat modes for other players
    default: op
# -------------------------------------------- #
# STAR NOTATION
# -------------------------------------------- #
  # All permissions (except admin/staff permissions)
  factions.chat.*:
    children:
      factions.chat.ally: true
      factions.chat.truce: true
      factions.chat.faction: true
      factions.chat.local: true
      factions.chat.global: true
      factions.chat.enemy: true
      factions.chat.neutral: true
      factions.chat.world: true
      factions.chat.color: true
      factions.chat.format: true
      factions.chat.magic: true
      factions.chat.rgb: true
      factions.chat.url: true
      factions.chat.hover: true
      factions.chat.click: true
      factions.chat.insert: true
      factions.chat.keybind: true
      factions.chat.translatable: true
      factions.chat.rainbow: true
      factions.chat.gradient: true
      factions.chat.transition: true
      factions.chat.font: true
      factions.chat.selector: true
      factions.chat.score: true
      factions.chat.nbt: true
      factions.chat.pride: true
      factions.chat.sprite: true
      factions.chat.head: true
      factions.chat.ignore: true
      factions.chat.toggle: true
  # Player-specific permissions - no formatting/color, no admin/staff
  factions.chat.player.*:
    children:
      factions.chat.ally: true
      factions.chat.truce: true
      factions.chat.faction: true
      factions.chat.local: true
      factions.chat.global: true
      factions.chat.enemy: true
      factions.chat.neutral: true
      factions.chat.world: true
      factions.chat.ignore: true
      factions.chat.toggle: true
  # Staff-only permissions
  factions.chat.admin.*:
    children:
      factions.chat.staff: true
      factions.chat.reload: true
      factions.chat.ignore.admin: true
      factions.chat.toggle.admin: true